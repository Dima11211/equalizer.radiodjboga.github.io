<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Эквалайзер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 320px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .visualizer-container {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 12px;
            padding: 12px;
        }

        canvas {
            width: 100%;
            height: 100px;
            display: block;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 12px;
            }
            canvas {
                height: 80px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="visualizer-container">
            <canvas id="visualizerCanvas"></canvas>
        </div>
    </div>

    <script>
        // ========== НАСТРОЙКИ ==========
        const DEFAULT_STREAM_URL = "https://radio.radiodjboga.online/stream";
        // =================================

        const canvas = document.getElementById('visualizerCanvas');
        const ctx = canvas.getContext('2d');

        let audioElement = null;
        let audioContext = null;
        let sourceNode = null;
        let analyserNode = null;
        let gainNode = null;
        let animationId = null;
        let isPlaying = false;
        
        let dataArray = null;
        let canvasWidth = 320;
        let canvasHeight = 100;

        // Функции для вызова из Android приложения
        window.startEqualizer = function() {
            startPlayback();
        };

        window.stopEqualizer = function() {
            stopPlayback();
        };

        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth - 24;
            canvas.height = 100;
            canvasWidth = canvas.width;
            canvasHeight = canvas.height;
            
            if (analyserNode) {
                const bufferLength = analyserNode.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);
            }
        }

        function startVisualization() {
            if (animationId) cancelAnimationFrame(animationId);
            
            function draw() {
                if (!analyserNode || !ctx) {
                    animationId = requestAnimationFrame(draw);
                    return;
                }
                
                if (dataArray) analyserNode.getByteFrequencyData(dataArray);
                
                ctx.clearRect(0, 0, canvasWidth, canvasHeight);
                
                // 64 столбца
                const barCount = 64;
                const barWidth = canvasWidth / barCount;
                
                const gradient = ctx.createLinearGradient(0, 0, 0, canvasHeight);
                gradient.addColorStop(0, '#ff6b6b');
                gradient.addColorStop(0.3, '#ffa502');
                gradient.addColorStop(0.6, '#4cd964');
                gradient.addColorStop(1, '#5ac8fa');
                
                // Группируем частоты для 64 столбцов
                const freqStep = Math.floor(analyserNode.frequencyBinCount / barCount);
                
                for (let i = 0; i < barCount; i++) {
                    // Усредняем значения частот
                    let sum = 0;
                    let count = 0;
                    for (let j = 0; j < freqStep; j++) {
                        const idx = i * freqStep + j;
                        if (idx < analyserNode.frequencyBinCount) {
                            sum += dataArray[idx] || 0;
                            count++;
                        }
                    }
                    let value = count > 0 ? sum / count : 0;
                    
                    let percent = value / 255;
                    let barHeight = Math.max(2, percent * canvasHeight * 0.85);
                    const x = i * barWidth;
                    const w = barWidth - 1;
                    const y = canvasHeight - barHeight;
                    
                    ctx.fillStyle = gradient;
                    ctx.shadowBlur = 3;
                    ctx.shadowColor = 'rgba(0,0,0,0.5)';
                    ctx.fillRect(x, y, w, barHeight);
                    
                    // Добавление эффекта свечения для высоких значений
                    if (percent > 0.7) {
                        ctx.fillStyle = 'rgba(255,255,255,0.3)';
                        ctx.fillRect(x, y, w, Math.min(barHeight, 3));
                    }
                }
                ctx.shadowBlur = 0;
                
                animationId = requestAnimationFrame(draw);
            }
            
            draw();
        }

        async function initWebAudio() {
            if (!audioElement) return false;
            
            if (audioContext && audioContext.state !== 'closed') {
                try { await audioContext.close(); } catch(e) {}
            }
            
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                sourceNode = audioContext.createMediaElementSource(audioElement);
                analyserNode = audioContext.createAnalyser();
                analyserNode.fftSize = 256;
                analyserNode.smoothingTimeConstant = 0.6;
                gainNode = audioContext.createGain();
                gainNode.gain.value = 0;
                
                sourceNode.connect(analyserNode);
                analyserNode.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                const bufferLength = analyserNode.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);
                
                startVisualization();
                return true;
            } catch (error) {
                console.error(error);
                return false;
            }
        }

        async function startPlayback() {
            try {
                if (audioElement) {
                    audioElement.pause();
                    audioElement.src = '';
                }
                
                if (audioContext) {
                    if (animationId) cancelAnimationFrame(animationId);
                    await audioContext.close();
                    audioContext = null;
                }
                
                audioElement = new Audio();
                audioElement.crossOrigin = 'anonymous';
                audioElement.src = DEFAULT_STREAM_URL;
                audioElement.preload = 'auto';
                
                await new Promise((resolve, reject) => {
                    const timeout = setTimeout(() => reject(new Error('Timeout')), 15000);
                    audioElement.addEventListener('canplay', () => {
                        clearTimeout(timeout);
                        resolve();
                    }, { once: true });
                    audioElement.addEventListener('error', () => {
                        clearTimeout(timeout);
                        reject(new Error('Error'));
                    }, { once: true });
                    audioElement.load();
                });
                
                await initWebAudio();
                
                if (audioContext && audioContext.state === 'suspended') {
                    await audioContext.resume();
                }
                
                await audioElement.play();
                isPlaying = true;
                
            } catch (err) {
                console.error(err);
                stopPlayback();
            }
        }

        function stopPlayback() {
            if (audioElement) {
                audioElement.pause();
                audioElement.src = '';
                audioElement = null;
            }
            
            if (audioContext && audioContext.state !== 'closed') {
                if (animationId) cancelAnimationFrame(animationId);
                audioContext.close().catch(e => console.log(e));
                audioContext = null;
            }
            
            analyserNode = null;
            sourceNode = null;
            gainNode = null;
            isPlaying = false;
            
            demoVisualization();
        }

        function demoVisualization() {
            let demoActive = true;
            
            function drawDemo() {
                if (isPlaying || !demoActive) return;
                
                ctx.clearRect(0, 0, canvasWidth, canvasHeight);
                
                // Демо-визуализация также с 64 столбцами
                const barCount = 64;
                const time = Date.now() * 0.005;
                const barWidth = canvasWidth / barCount;
                
                for (let i = 0; i < barCount; i++) {
                    let fakeHeight = 20 + Math.sin(time + i * 0.15) * 15;
                    fakeHeight = Math.min(canvasHeight * 0.7, Math.max(5, fakeHeight));
                    const x = i * barWidth;
                    const w = barWidth - 1;
                    const y = canvasHeight - fakeHeight;
                    
                    const hue = (i * 8 + time * 50) % 360;
                    ctx.fillStyle = `hsl(${hue}, 70%, 55%)`;
                    ctx.shadowBlur = 2;
                    ctx.fillRect(x, y, w, fakeHeight);
                }
                ctx.shadowBlur = 0;
                
                requestAnimationFrame(drawDemo);
            }
            
            drawDemo();
        }

        window.addEventListener('resize', () => setTimeout(resizeCanvas, 100));
        
        resizeCanvas();
        demoVisualization();
        
        window.addEventListener('beforeunload', () => {
            if (audioElement) {
                audioElement.pause();
                audioElement.src = '';
            }
            if (audioContext) audioContext.close();
        });
    </script>
</body>
</html>
