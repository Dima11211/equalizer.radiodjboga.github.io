<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Эквалайзер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            margin: 0;
        }

        .container {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 8px;
        }

        canvas {
            width: 100%;
            height: 100px;
            display: block;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <canvas id="visualizerCanvas"></canvas>
    </div>

    <script>
        // ========== НАСТРОЙКИ ==========
        const DEFAULT_STREAM_URL = "https://radio.radiodjboga.online/stream";
        const DELAY_MS = 10000; // Задержка 2 секунды
        // =================================

        const canvas = document.getElementById('visualizerCanvas');
        const ctx = canvas.getContext('2d');

        let audioElement = null;
        let audioContext = null;
        let sourceNode = null;
        let analyserNode = null;
        let gainNode = null;
        let animationId = null;
        let isPlaying = false;
        
        let dataArray = null;
        let canvasWidth = 400;
        let canvasHeight = 100;
        
        // Буфер для хранения данных с задержкой
        let delayBuffer = [];
        let delayBufferSize = 0;

        // Функции для вызова из Android
        window.startEqualizer = function() {
            console.log("startEqualizer called from Android");
            startPlayback();
        };

        window.stopEqualizer = function() {
            console.log("stopEqualizer called from Android");
            stopPlayback();
        };

        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth - 16;
            canvas.height = 100;
            canvasWidth = canvas.width;
            canvasHeight = canvas.height;
            
            if (analyserNode) {
                const bufferLength = analyserNode.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);
            }
        }

        function startVisualization() {
            if (animationId) cancelAnimationFrame(animationId);
            
            function draw() {
                if (!analyserNode || !ctx) {
                    animationId = requestAnimationFrame(draw);
                    return;
                }
                
                if (dataArray) analyserNode.getByteFrequencyData(dataArray);
                
                // Сохраняем текущие данные в буфер задержки
                if (dataArray) {
                    const currentData = new Uint8Array(dataArray);
                    delayBuffer.push(currentData);
                    
                    // Ограничиваем размер буфера (2 секунды при ~60fps = 120 кадров)
                    const maxBufferSize = Math.floor(DELAY_MS / (1000 / 60)) + 10;
                    while (delayBuffer.length > maxBufferSize) {
                        delayBuffer.shift();
                    }
                }
                
                // Берем данные с задержкой
                let delayedData = null;
                if (delayBuffer.length > 0) {
                    // Индекс для задержки (последние данные = текущие, берем более старые)
                    const delayIndex = Math.max(0, delayBuffer.length - Math.floor(DELAY_MS / (1000 / 60)));
                    if (delayBuffer[delayIndex]) {
                        delayedData = delayBuffer[delayIndex];
                    } else if (delayBuffer[0]) {
                        delayedData = delayBuffer[0];
                    }
                }
                
                // Используем задержанные данные для визуализации
                const visualData = delayedData || dataArray;
                
                ctx.clearRect(0, 0, canvasWidth, canvasHeight);
                
                const barCount = 48;
                const barWidth = canvasWidth / barCount;
                
                const gradient = ctx.createLinearGradient(0, 0, 0, canvasHeight);
                gradient.addColorStop(0, '#ff6b6b');
                gradient.addColorStop(0.3, '#ffa502');
                gradient.addColorStop(0.6, '#4cd964');
                gradient.addColorStop(1, '#5ac8fa');
                
                const freqStep = Math.floor(analyserNode.frequencyBinCount / barCount);
                
                for (let i = 0; i < barCount; i++) {
                    let sum = 0;
                    let count = 0;
                    for (let j = 0; j < freqStep; j++) {
                        const idx = i * freqStep + j;
                        if (idx < analyserNode.frequencyBinCount && visualData) {
                            sum += visualData[idx] || 0;
                            count++;
                        }
                    }
                    let value = count > 0 ? sum / count : 0;
                    
                    let percent = value / 255;
                    let barHeight = Math.max(2, percent * canvasHeight * 0.85);
                    const x = i * barWidth;
                    const w = barWidth - 1;
                    const y = canvasHeight - barHeight;
                    
                    ctx.fillStyle = gradient;
                    ctx.fillRect(x, y, w, barHeight);
                }
                
                animationId = requestAnimationFrame(draw);
            }
            
            draw();
        }

        async function initWebAudio() {
            if (!audioElement) return false;
            
            if (audioContext && audioContext.state !== 'closed') {
                try { await audioContext.close(); } catch(e) {}
            }
            
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                sourceNode = audioContext.createMediaElementSource(audioElement);
                analyserNode = audioContext.createAnalyser();
                analyserNode.fftSize = 256;
                analyserNode.smoothingTimeConstant = 0.6;
                gainNode = audioContext.createGain();
                gainNode.gain.value = 0;
                
                sourceNode.connect(analyserNode);
                analyserNode.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                const bufferLength = analyserNode.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);
                
                // Очищаем буфер задержки при новом подключении
                delayBuffer = [];
                
                startVisualization();
                return true;
            } catch (error) {
                console.error(error);
                return false;
            }
        }

        async function startPlayback() {
            try {
                if (audioElement) {
                    audioElement.pause();
                    audioElement.src = '';
                }
                
                if (audioContext) {
                    if (animationId) cancelAnimationFrame(animationId);
                    await audioContext.close();
                    audioContext = null;
                }
                
                audioElement = new Audio();
                audioElement.crossOrigin = 'anonymous';
                audioElement.src = DEFAULT_STREAM_URL;
                audioElement.preload = 'auto';
                
                await new Promise((resolve, reject) => {
                    const timeout = setTimeout(() => reject(new Error('Timeout')), 15000);
                    audioElement.addEventListener('canplay', () => {
                        clearTimeout(timeout);
                        resolve();
                    }, { once: true });
                    audioElement.addEventListener('error', () => {
                        clearTimeout(timeout);
                        reject(new Error('Error'));
                    }, { once: true });
                    audioElement.load();
                });
                
                await initWebAudio();
                
                if (audioContext && audioContext.state === 'suspended') {
                    await audioContext.resume();
                }
                
                await audioElement.play();
                isPlaying = true;
                
                console.log("Playback started with " + DELAY_MS + "ms delay");
                
            } catch (err) {
                console.error(err);
                stopPlayback();
            }
        }

        function stopPlayback() {
            if (audioElement) {
                audioElement.pause();
                audioElement.src = '';
                audioElement = null;
            }
            
            if (audioContext && audioContext.state !== 'closed') {
                if (animationId) cancelAnimationFrame(animationId);
                audioContext.close().catch(e => console.log(e));
                audioContext = null;
            }
            
            analyserNode = null;
            sourceNode = null;
            gainNode = null;
            isPlaying = false;
            
            // Очищаем буфер задержки
            delayBuffer = [];
            
            demoVisualization();
        }

        function demoVisualization() {
            let demoActive = true;
            
            function drawDemo() {
                if (isPlaying || !demoActive) return;
                
                ctx.clearRect(0, 0, canvasWidth, canvasHeight);
                
                const barCount = 48;
                const time = Date.now() * 0.005;
                const barWidth = canvasWidth / barCount;
                
                for (let i = 0; i < barCount; i++) {
                    let fakeHeight = 15 + Math.sin(time + i * 0.15) * 12;
                    fakeHeight = Math.min(canvasHeight * 0.6, Math.max(3, fakeHeight));
                    const x = i * barWidth;
                    const w = barWidth - 1;
                    const y = canvasHeight - fakeHeight;
                    
                    const hue = (i * 8 + time * 50) % 360;
                    ctx.fillStyle = `hsl(${hue}, 70%, 55%)`;
                    ctx.fillRect(x, y, w, fakeHeight);
                }
                
                requestAnimationFrame(drawDemo);
            }
            
            drawDemo();
        }

        window.addEventListener('resize', () => setTimeout(resizeCanvas, 100));
        
        resizeCanvas();
        demoVisualization();
        
        window.addEventListener('beforeunload', () => {
            if (audioElement) {
                audioElement.pause();
                audioElement.src = '';
            }
            if (audioContext) audioContext.close();
        });
    </script>
</body>
</html>
